<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Isometric City — визуальный skeleton</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: #1a1a1e;
    font-family: 'Courier New', monospace;
  }
  #canvas-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 2px solid #333;
  }
  #hud {
    position: absolute; top: 12px; left: 12px;
    color: #9fd; font-size: 12px; line-height: 1.5;
    background: rgba(0,0,0,0.5); padding: 8px 12px;
    border: 1px solid #2a2;
    pointer-events: none;
  }
  #compass {
    position: absolute; top: 78px; left: 12px;
    width: 44px; height: 44px;
    pointer-events: none;
  }
  #minimap {
    position: absolute; top: 12px; right: 12px;
    width: 260px; height: 260px;
    border: 2px solid #333;
    filter: saturate(0.9) brightness(0.95);
    cursor: grab;
  }
  #minimap-label {
    position: absolute; top: 276px; right: 12px;
    width: 260px; text-align: center;
    color: #9fd; font-size: 10px;
    background: rgba(0,0,0,0.5); padding: 3px 0;
    pointer-events: none;
  }
  #geocode-panel {
    position: absolute; top: 300px; right: 12px;
    width: 260px; display: flex; gap: 4px;
  }
  #geocode-panel input {
    flex: 1; background: #111; color: #9fd; border: 1px solid #333;
    font-family: 'Courier New', monospace; font-size: 11px; padding: 4px 6px;
  }
  #controls {
    position: absolute; bottom: 12px; left: 12px;
    color: #ccc; font-size: 12px;
    background: rgba(0,0,0,0.5); padding: 8px 12px;
    border: 1px solid #444;
  }
  button {
    font-family: 'Courier New', monospace;
    background: #222; color: #9fd; border: 1px solid #2a2;
    padding: 4px 10px; margin-right: 6px; cursor: pointer;
  }
  button:hover { background: #2a2a2a; }
  #data-panel {
    position: absolute; bottom: 12px; right: 12px;
    color: #ccc; font-size: 12px;
    background: rgba(0,0,0,0.6); padding: 10px 12px;
    border: 1px solid #444; width: 230px;
  }
  #data-panel .row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  #data-panel button { width: 100%; margin: 6px 0 0; }
  #status { color: #f5c; margin-top: 6px; min-height: 14px; }
</style>
</head>
<body>

<div id="canvas-wrap"></div>

<div id="hud">
  ISO SKELETON // real Overpass footprints, fixed isometric camera<br>
  покрытие двора: газон (сплошная заливка, без паттерна)
</div>

<div id="controls">
  render scale:
  <button data-scale="0.25">chunky (¼)</button>
  <button data-scale="0.5">medium (½)</button>
  <button data-scale="1">sharp (1×)</button>
</div>

<div id="data-panel">
  <div class="row"><span>ширина bbox</span><span id="bboxW">–</span></div>
  <div class="row"><span>высота bbox</span><span id="bboxH">–</span></div>
  <button id="loadBtn">сгенерировать из вида миникарты</button>
  <div id="status">idle</div>
</div>

<div id="geocode-panel">
  <input id="geocodeInput" placeholder="найти место (город, улица)">
  <button id="geocodeBtn">найти</button>
</div>

<svg id="compass" viewBox="0 0 60 60">
  <circle cx="30" cy="30" r="26" fill="rgba(0,0,0,0.6)" stroke="#2a2" stroke-width="1.5"/>
  <g id="compass-needle">
    <line x1="30" y1="30" x2="30" y2="10" stroke="#f55" stroke-width="2"/>
    <text x="30" y="8" fill="#f55" font-size="10" text-anchor="middle" font-family="Courier New">N</text>
  </g>
</svg>

<div id="minimap"></div>
<div id="minimap-label">миникарта (реальность, OSM)</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ---------------------------------------------------------------------------
// НАСТРОЙКИ ПРОЕКЦИИ
// ---------------------------------------------------------------------------
// Мировые оси (до поворота "city group"):
//   +X = восток, -Z = север, +Y = вверх.
// Вся "городская" геометрия кладётся в CITY_GROUP, который разворачиваем на
// 45° вокруг Y — это даёт классическую ромбовидную изометрию на экране.
// Камера стоит строго по диагонали (1,1,1) — угол места 35.264° (true isometric).
const CITY_ROTATION_DEG = 45;           // поворот сетки для ромбовидного вида
const CELL_SIZE = 10;                    // метры на одну ячейку грида
const GRID_CELLS = 20;                   // множитель начального размера площадки (20×10м=200м), сама сетка больше не рисуется

let INTERNAL_SCALE = 0.5;                // множитель разрешения рендера (пиксель-арт чанкость)

// ---------------------------------------------------------------------------
// БАЗА: сцена, камера, свет
// ---------------------------------------------------------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1e);

const wrap = document.getElementById('canvas-wrap');
const VIEW_W = Math.min(window.innerWidth - 20, 960);
const VIEW_H = Math.min(window.innerHeight - 20, 640);

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(1); // важно: сами контролируем пиксельность через internal scale
wrap.appendChild(renderer.domElement);

// Ортографическая камера — фиксированный изометрический вид
const FRUSTUM_SIZE_STATE = { value: 140 }; // "зум" в метрах видимой области, меняется под bbox
let camera;
function buildCamera() {
  const aspect = VIEW_W / VIEW_H;
  const f = FRUSTUM_SIZE_STATE.value;
  camera = new THREE.OrthographicCamera(
    -f * aspect / 2, f * aspect / 2,
    f / 2, -f / 2,
    0.1, 1000
  );
  const d = 120;
  camera.position.set(d, d, d); // строго диагональ (1,1,1) => true isometric 35.264°
  camera.lookAt(0, 0, 0);
}
buildCamera();

// Свет: направленный (имитация солнца под изо-углом) + мягкий ambient,
// чтобы верх/бок кубов читались, но мы всё равно продублируем контраст
// вручную через материалы граней (классический voxel-приём).
const ambient = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 0.5);
sun.position.set(80, 140, 60);
scene.add(sun);

// ---------------------------------------------------------------------------
// ГРУППА ГОРОДА (та самая, что развёрнута на 45°)
// ---------------------------------------------------------------------------
const cityGroup = new THREE.Group();
cityGroup.rotation.y = THREE.MathUtils.degToRad(CITY_ROTATION_DEG);
scene.add(cityGroup);

// ---------------------------------------------------------------------------
// ТЕКСТУРА ЗЕМЛИ: газон с пиксельным шумом + бетонные дорожки (двор-крест на
// тайл). Заменяет прежний плоский зелёный цвет+GridHelper — теперь это
// повторяющаяся canvas-текстура, тайлится через RepeatWrapping.
// ---------------------------------------------------------------------------
const GROUND_TILE_METERS = 16; // размер одного тайла текстуры в метрах

function buildGroundTexture() {
  const size = 32;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // газон — пиксельный шум из нескольких оттенков зелёного, без паттерна/сетки
  const grassShades = ['#33502f', '#3a5a35', '#2c4728', '#405f3a'];
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      ctx.fillStyle = grassShades[Math.floor(Math.random() * grassShades.length)];
      ctx.fillRect(x, y, 1, 1);
    }
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

const groundTexture = buildGroundTexture();

// Земля — пока плоская (рельеф добавим позже), но уже с текстурой вместо заливки
const groundSize = CELL_SIZE * GRID_CELLS;
const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize);
const groundMat = new THREE.MeshBasicMaterial({ map: groundTexture });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
groundTexture.repeat.set(groundSize / GROUND_TILE_METERS, groundSize / GROUND_TILE_METERS);
cityGroup.add(ground);

// ---------------------------------------------------------------------------
// PIXEL-ART VOXEL BUILDING: 3-тональная закраска граней (верх/бок1/бок2)
// вместо расчёта на реальном освещении — так буквы читаются чётче.
// ---------------------------------------------------------------------------
function shade(hex, factor) {
  const c = new THREE.Color(hex);
  return factor >= 1
    ? c.lerp(new THREE.Color(0xffffff), factor - 1)
    : c.lerp(new THREE.Color(0x000000), 1 - factor);
}

function makeBuilding({ x, z, w, d, floors, type }) {
  const floorHeight = 3.2;
  const height = floors * floorHeight;

  const baseColor = type === 'residential' ? 0xd98a4a
                   : type === 'industrial' ? 0x8a97a3
                   : 0xb8b0a0;

  const topColor   = shade(baseColor, 1.25);
  const sideColorA = shade(baseColor, 0.85);
  const sideColorB = shade(baseColor, 0.65);

  // Порядок граней BoxGeometry: +x, -x, +y(top), -y(bottom), +z, -z
  const materials = [
    new THREE.MeshBasicMaterial({ color: sideColorA }), // +x
    new THREE.MeshBasicMaterial({ color: sideColorB }), // -x
    new THREE.MeshBasicMaterial({ color: topColor }),   // +y top
    new THREE.MeshBasicMaterial({ color: 0x111111 }),   // -y bottom (не видно)
    new THREE.MeshBasicMaterial({ color: sideColorA }), // +z
    new THREE.MeshBasicMaterial({ color: sideColorB }), // -z
  ];

  const geo = new THREE.BoxGeometry(w, height, d);
  const mesh = new THREE.Mesh(geo, materials);
  mesh.position.set(x, height / 2, z);

  // простые "окна" для жилых — тонкие тёмные полоски через EdgesGeometry
  if (type === 'residential') {
    const edges = new THREE.EdgesGeometry(geo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x2a1a10 }));
    line.position.copy(mesh.position);
    cityGroup.add(line);
  }

  cityGroup.add(mesh);
  return mesh;
}

// Плейсхолдер-застройка на случай, если Overpass недоступен (демо/офлайн)
function loadPlaceholderDemo() {
  makeBuilding({ x: -30, z: -20, w: 18, d: 14, floors: 9,  type: 'residential' });
  makeBuilding({ x: -30, z:  10, w: 18, d: 14, floors: 5,  type: 'residential' });
  makeBuilding({ x:  -5, z: -30, w: 12, d: 10, floors: 2,  type: 'other' });
  makeBuilding({ x:  15, z:   5, w: 30, d: 20, floors: 1,  type: 'industrial' });
  makeBuilding({ x:  15, z: -25, w: 20, d: 12, floors: 1,  type: 'industrial' });
  makeBuilding({ x:  35, z:  25, w: 10, d: 10, floors: 3,  type: 'residential' });
}

// ---------------------------------------------------------------------------
// ГЕО-ПРОЕКЦИЯ: lat/lon -> локальные метры относительно центра bbox.
// Простая equirectangular-аппроксимация — на масштабе квартала (сотни метров)
// погрешность пренебрежимо мала, полноценный UTM не нужен.
// Помним: +X = восток, -Z = север (см. настройки выше).
// ---------------------------------------------------------------------------
const EARTH_R = 6378137;
function geoToLocal(lat, lon, refLat, refLon) {
  const x = (lon - refLon) * Math.PI / 180 * EARTH_R * Math.cos(refLat * Math.PI / 180);
  const z = -(lat - refLat) * Math.PI / 180 * EARTH_R;
  return { x, z };
}

// ---------------------------------------------------------------------------
// ТИП ЗДАНИЯ И ВЫСОТА ИЗ ТЕГОВ OSM
// ---------------------------------------------------------------------------
function classifyBuilding(tags) {
  const b = tags.building || '';
  if (['residential', 'apartments', 'house', 'terrace', 'dormitory'].includes(b)) return 'residential';
  if (['industrial', 'warehouse', 'garage', 'garages', 'manufacture'].includes(b)) return 'industrial';
  return 'other';
}

function estimateHeight(tags) {
  if (tags.height) {
    const h = parseFloat(String(tags.height).replace(/[^\d.]/g, ''));
    if (!isNaN(h) && h > 0) return h;
  }
  if (tags['building:levels']) {
    const levels = parseFloat(tags['building:levels']);
    if (!isNaN(levels) && levels > 0) return levels * 3.2;
  }
  // дефолт по типу, если тегов нет вообще
  const type = classifyBuilding(tags);
  return type === 'industrial' ? 6 : 8; // ~1-2 этажа по умолчанию
}

// ---------------------------------------------------------------------------
// MULTIPOLYGON-ЗДАНИЯ (relation): OSM часто хранит сложные здания не одним
// way, а relation'ом с ролями outer/inner, где сам контур ещё и разбит на
// несколько отдельных way-фрагментов (чтобы переиспользовать общие границы
// с соседними объектами). Overpass "out geom" отдаёт каждый member со своей
// geometry, но их нужно самостоятельно склеить в замкнутые кольца по общим
// концевым точкам — этим занимается assembleRings().
// ---------------------------------------------------------------------------
function assembleRings(segments) {
  const eq = (a, b) => Math.abs(a.lat - b.lat) < 1e-7 && Math.abs(a.lon - b.lon) < 1e-7;
  const remaining = segments.map(s => s.slice()).filter(s => s.length >= 2);
  const rings = [];

  while (remaining.length) {
    let current = remaining.shift();
    let guard = 0;
    while (!eq(current[0], current[current.length - 1]) && remaining.length && guard++ < 500) {
      const tail = current[current.length - 1];
      let foundIdx = -1, reverse = false;
      for (let i = 0; i < remaining.length; i++) {
        const seg = remaining[i];
        if (eq(seg[0], tail)) { foundIdx = i; reverse = false; break; }
        if (eq(seg[seg.length - 1], tail)) { foundIdx = i; reverse = true; break; }
      }
      if (foundIdx === -1) break; // не удалось замкнуть — отдаём как есть
      let seg = remaining.splice(foundIdx, 1)[0];
      if (reverse) seg = seg.slice().reverse();
      current = current.concat(seg.slice(1));
    }
    rings.push(current);
  }
  return rings;
}

// ray casting, точка/полигон в локальных метрах {x,z} — нужно сопоставить
// дырку (inner-кольцо) с тем внешним контуром, в который она попадает,
// когда relation описывает несколько отдельных зданий сразу.
function pointInPolygon(pt, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, zi = poly[i].z, xj = poly[j].x, zj = poly[j].z;
    const intersect = ((zi > pt.z) !== (zj > pt.z)) &&
      (pt.x < (xj - xi) * (pt.z - zi) / (zj - zi + 1e-12) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

// ---------------------------------------------------------------------------
// ФАСАДНЫЕ ТЕКСТУРЫ: процедурные окна вместо плоской заливки.
// Одна "ячейка" канваса = один оконный пролёт (bay) по горизонтали на один
// этаж по вертикали. Повтор текстуры считаем из периметра здания и числа
// этажей — так паттерн корректно растягивается на любую footprint-геометрию
// из OSM, а не только на прямоугольные боксы.
// ---------------------------------------------------------------------------
const facadeTextureCache = {}; // канвас на тип здания создаём один раз

function buildFacadeCanvas(type) {
  const cell = type === 'industrial' ? 24 : 16;
  const canvas = document.createElement('canvas');
  canvas.width = cell;
  canvas.height = cell;
  const ctx = canvas.getContext('2d');

  if (type === 'residential') {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, cell, cell);
    ctx.fillStyle = '#4a5568';                 // стекло
    ctx.fillRect(3, 3, cell - 6, cell - 7);
    ctx.strokeStyle = '#2a1a10';                // рама окна
    ctx.lineWidth = 1;
    ctx.strokeRect(3, 3, cell - 6, cell - 7);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';         // тень под окном/парапет балкона
    ctx.fillRect(0, cell - 2, cell, 2);
  } else if (type === 'industrial') {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, cell, cell);
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';       // горизонтальный шов металлопрофиля
    ctx.beginPath();
    ctx.moveTo(0, cell * 0.5);
    ctx.lineTo(cell, cell * 0.5);
    ctx.stroke();
    ctx.fillStyle = '#3a4550';                  // редкое узкое окно — минимум остекления
    ctx.fillRect(cell * 0.38, cell * 0.12, cell * 0.24, cell * 0.22);
  } else {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, cell, cell);
    ctx.fillStyle = '#5a6a78';
    ctx.fillRect(cell * 0.2, cell * 0.2, cell * 0.6, cell * 0.55);
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.magFilter = THREE.NearestFilter;          // без сглаживания — пиксель-арт
  tex.minFilter = THREE.NearestFilter;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function getFacadeTexture(type) {
  if (!facadeTextureCache[type]) facadeTextureCache[type] = buildFacadeCanvas(type);
  return facadeTextureCache[type];
}

const BAY_METERS = { residential: 4, industrial: 7, other: 5 }; // ширина одного оконного пролёта

function polygonPerimeter(pts) {
  let sum = 0;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i];
    const b = pts[(i + 1) % pts.length];
    sum += Math.hypot(b.x - a.x, b.z - a.z);
  }
  return sum;
}

// ---------------------------------------------------------------------------
// ЭКСТРУЗИЯ ПОЛИГОНА ЗДАНИЯ (реальный footprint из OSM, а не бокс)
// ---------------------------------------------------------------------------
const loadedMeshes = []; // всё, что нужно чистить перед перезагрузкой

function makeFootprintBuilding(points2D, height, type, holes = []) {
  // points2D: [{x,z}, ...] уже спроецированные локальные координаты,
  // замкнутый контур (OSM way обычно даёт первую точку == последней — уберём дубль)
  const pts = points2D.slice();
  if (pts.length > 1) {
    const a = pts[0], b = pts[pts.length - 1];
    if (Math.abs(a.x - b.x) < 1e-6 && Math.abs(a.z - b.z) < 1e-6) pts.pop();
  }
  if (pts.length < 3) return null;

  // THREE.Shape живёт в плоскости XY -> используем (x, z) здания как (x, y) шейпа,
  // а после экструзии повернём геометрию в XZ-плоскость.
  // ВАЖНО: ось Z инвертируем (-p.z). geo.rotateX(-90°) ниже сам по себе
  // переворачивает знак этой оси (Y_shape -> -Z_world), поэтому чтобы итоговая
  // ориентация здания совпадала с дорогами/сеткой (у которых -Z = север без
  // всякого поворота), контур нужно один раз зеркально скомпенсировать здесь.
  // Без этой инверсии здания получаются отражены по оси север-юг.
  const shape = new THREE.Shape(pts.map(p => new THREE.Vector2(p.x, -p.z)));

  // Дырки (внутренние дворы multipolygon-зданий) — та же инверсия оси Z.
  holes.forEach(holePts => {
    const hp = holePts.slice();
    if (hp.length > 1) {
      const a = hp[0], b = hp[hp.length - 1];
      if (Math.abs(a.x - b.x) < 1e-6 && Math.abs(a.z - b.z) < 1e-6) hp.pop();
    }
    if (hp.length >= 3) {
      shape.holes.push(new THREE.Path(hp.map(p => new THREE.Vector2(p.x, -p.z))));
    }
  });

  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: height,
    bevelEnabled: false,
    steps: 1,
  });
  // ExtrudeGeometry экструдирует вдоль +Z -> поворачиваем так, чтобы высота шла по Y
  geo.rotateX(-Math.PI / 2);

  const baseColor = type === 'residential' ? 0xd98a4a
                   : type === 'industrial' ? 0x8a97a3
                   : 0xb8b0a0;
  const sideColor = shade(baseColor, 0.78);
  const topColor  = shade(baseColor, 1.25);

  // Повтор фасадной текстуры: по вертикали — ровно по числу этажей (UV высоты
  // стены всегда 0..1, так что repeat.y=floors даёт одну ячейку на этаж);
  // по горизонтали — берём средний размер сегмента полигона (периметр/число
  // сегментов) и делим на ширину пролёта. Это приближение: у каждого сегмента
  // своя длина, а материал общий на всё здание, поэтому длинные и короткие
  // стены получат чуть разный масштаб окон — для пиксель-арт low-res стиля
  // на глаз это не заметно, но при укрупнении текстур стоит пересмотреть.
  const floors = Math.max(1, Math.round(height / 3.2));
  const perimeter = polygonPerimeter(pts);
  const avgSegment = perimeter / pts.length;
  const bay = BAY_METERS[type] || 5;
  const repeatX = Math.max(1, Math.round(avgSegment / bay));

  const facadeTex = getFacadeTexture(type).clone();
  facadeTex.needsUpdate = true;
  facadeTex.repeat.set(repeatX, floors);

  // ExtrudeGeometry создаёт 2 группы материалов: 0 = боковые грани, 1 = крышки (верх+низ)
  // DoubleSide обязателен: полигоны OSM бывают закручены в любую сторону,
  // без этого часть зданий будет "невидимой" из-за backface culling.
  // Крыша — сплошная заливка, без обводки/паттерна (по просьбе — "везде просто заливка").
  const materials = [
    new THREE.MeshBasicMaterial({ map: facadeTex, color: sideColor, side: THREE.DoubleSide }),
    new THREE.MeshBasicMaterial({ color: topColor, side: THREE.DoubleSide }),
  ];

  const mesh = new THREE.Mesh(geo, materials);
  cityGroup.add(mesh);
  loadedMeshes.push(mesh);

  // Чёрная обводка рёбер — порог угла 20° отсекает внутренние швы триангуляции
  // плоской крыши (там угол между соседними треугольниками ~0°) и оставляет
  // только настоящие рёбра геометрии (углы здания, стык стена/крыша).
  const edges = new THREE.EdgesGeometry(geo, 20);
  const outline = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x1a1410 }));
  cityGroup.add(outline);
  loadedMeshes.push(outline);

  return mesh;
}

// ---------------------------------------------------------------------------
// ВОДОЁМЫ: плоская заливка + чёрная обводка контура. Тот же трюк с shape/
// rotateX(-90°), что и у зданий (без экструзии — просто плоский полигон,
// поднятый чуть выше земли, чтобы не z-fighting'ить с текстурой газона).
// ---------------------------------------------------------------------------
const WATER_Y = 0.09;
const waterBodyRegistry = []; // {pts, area} — крупные водоёмы, по ним ходит катер
const LARGE_WATER_AREA_M2 = 1500; // порог "крупный водоём" для катера

function shoelaceArea(pts) {
  let sum = 0;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    sum += a.x * b.z - b.x * a.z;
  }
  return sum / 2;
}

function makeWaterBody(points2D, holes = []) {
  const pts = points2D.slice();
  if (pts.length > 1) {
    const a = pts[0], b = pts[pts.length - 1];
    if (Math.abs(a.x - b.x) < 1e-6 && Math.abs(a.z - b.z) < 1e-6) pts.pop();
  }
  if (pts.length < 3) return null;

  const shape = new THREE.Shape(pts.map(p => new THREE.Vector2(p.x, -p.z)));
  holes.forEach(holePts => {
    const hp = holePts.slice();
    if (hp.length > 1) {
      const a = hp[0], b = hp[hp.length - 1];
      if (Math.abs(a.x - b.x) < 1e-6 && Math.abs(a.z - b.z) < 1e-6) hp.pop();
    }
    if (hp.length >= 3) shape.holes.push(new THREE.Path(hp.map(p => new THREE.Vector2(p.x, -p.z))));
  });

  const geo = new THREE.ShapeGeometry(shape);
  geo.rotateX(-Math.PI / 2);

  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x2f6ea8, side: THREE.DoubleSide }));
  mesh.position.y = WATER_Y;
  cityGroup.add(mesh);
  loadedMeshes.push(mesh);

  // порог 1° — оставляет только настоящую береговую линию, без внутренних
  // швов триангуляции (там угол между соседними треугольниками ровно 0°)
  const edges = new THREE.EdgesGeometry(geo, 1);
  const outline = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x0d2b3d }));
  outline.position.y = WATER_Y + 0.005;
  cityGroup.add(outline);
  loadedMeshes.push(outline);

  const area = Math.abs(shoelaceArea(pts));
  if (area > LARGE_WATER_AREA_M2) waterBodyRegistry.push({ pts, area });

  return mesh;
}

// ---------------------------------------------------------------------------
// ЗАБОРЫ/ОГРАЖДЕНИЯ (barrier=fence/wall/hedge/...): тонкая вертикальная
// лента вдоль полилинии — тот же принцип, что и у дорог, только без ширины,
// просто плоскость от земли до нужной высоты.
// ---------------------------------------------------------------------------
const BARRIER_STYLE = {
  fence:          { color: 0x8a6a45, height: 1.2 },
  wall:           { color: 0x9a9a92, height: 1.6 },
  retaining_wall: { color: 0x7a7a72, height: 1.0 },
  hedge:          { color: 0x3a5a30, height: 1.4 },
  gate:           { color: 0x6a6a62, height: 1.2 },
};
const DEFAULT_BARRIER_STYLE = { color: 0x8a6a45, height: 1.2 };

function makeBarrier(points2D, tags) {
  if (points2D.length < 2) return null;
  const style = BARRIER_STYLE[tags.barrier] || DEFAULT_BARRIER_STYLE;

  const positions = [];
  const indices = [];
  for (let i = 0; i < points2D.length; i++) {
    const p = points2D[i];
    positions.push(p.x, 0, p.z);
    positions.push(p.x, style.height, p.z);
  }
  for (let i = 0; i < points2D.length - 1; i++) {
    const a = i * 2, b = i * 2 + 1, c = i * 2 + 2, d = i * 2 + 3;
    indices.push(a, b, c, b, d, c);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);

  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: style.color, side: THREE.DoubleSide }));
  cityGroup.add(mesh);
  loadedMeshes.push(mesh);
  return mesh;
}

// ---------------------------------------------------------------------------
// Ж/Д ПУТИ: лента балласта (как у дорог) + два тонких рельса поверх, смещённые
// от центра линии на "колею". Длинные перегоны (>100 м) регистрируются для
// составов — короткие подъездные тупики поездов не получают.
// ---------------------------------------------------------------------------
const RAIL_BALLAST_COLOR = 0x5a5248;
const RAIL_RAIL_COLOR = 0xc4c4b8;
const RAIL_WIDTH = 3.4;
const RAIL_GAUGE = 0.9; // смещение каждого рельса от центра линии, м

const railRegistry = []; // {points, cum, total} — длинные перегоны для составов

function railNormalAt(points2D, i) {
  const p = points2D[i];
  const prev = points2D[Math.max(0, i - 1)];
  const next = points2D[Math.min(points2D.length - 1, i + 1)];
  const dx = next.x - prev.x, dz = next.z - prev.z;
  const len = Math.hypot(dx, dz) || 1;
  return { nx: -dz / len, nz: dx / len, base: p };
}

function makeRailway(points2D) {
  if (points2D.length < 2) return null;

  // балласт — та же triangle-strip логика, что и у дорог
  const positions = [];
  const indices = [];
  const cum = [0];
  for (let i = 1; i < points2D.length; i++) {
    cum.push(cum[i - 1] + Math.hypot(points2D[i].x - points2D[i - 1].x, points2D[i].z - points2D[i - 1].z));
  }
  for (let i = 0; i < points2D.length; i++) {
    const { nx, nz, base } = railNormalAt(points2D, i);
    positions.push(base.x + nx * RAIL_WIDTH / 2, 0.10, base.z + nz * RAIL_WIDTH / 2);
    positions.push(base.x - nx * RAIL_WIDTH / 2, 0.10, base.z - nz * RAIL_WIDTH / 2);
  }
  for (let i = 0; i < points2D.length - 1; i++) {
    const a = i * 2, b = i * 2 + 1, c = i * 2 + 2, d = i * 2 + 3;
    indices.push(a, b, c, b, d, c);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);
  const ballast = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: RAIL_BALLAST_COLOR, side: THREE.DoubleSide }));
  cityGroup.add(ballast);
  loadedMeshes.push(ballast);

  // два тонких рельса поверх балласта
  [-1, 1].forEach(side => {
    const railPositions = [];
    for (let i = 0; i < points2D.length; i++) {
      const { nx, nz, base } = railNormalAt(points2D, i);
      railPositions.push(base.x + nx * RAIL_GAUGE * side, 0.11, base.z + nz * RAIL_GAUGE * side);
    }
    const railGeo = new THREE.BufferGeometry();
    railGeo.setAttribute('position', new THREE.Float32BufferAttribute(railPositions, 3));
    const railLine = new THREE.Line(railGeo, new THREE.LineBasicMaterial({ color: RAIL_RAIL_COLOR }));
    cityGroup.add(railLine);
    loadedMeshes.push(railLine);
  });

  if (cum[cum.length - 1] > 8) {
    railRegistry.push({ points: points2D, cum, total: cum[cum.length - 1] });
  }
  return ballast;
}

function clearLoadedBuildings() {
  loadedMeshes.forEach(m => {
    cityGroup.remove(m);
    m.geometry.dispose();
    if (Array.isArray(m.material)) m.material.forEach(mm => mm.dispose());
    else m.material.dispose();
  });
  loadedMeshes.length = 0;
  roadRegistry.length = 0;
  waterBodyRegistry.length = 0;
  railRegistry.length = 0;
}

// ---------------------------------------------------------------------------
// ДОРОГИ: полоса-ribbon вдоль полилинии way["highway"], ширина по типу дороги.
// Строим triangle strip вручную (проще и дешевле, чем TubeGeometry для
// плоской дороги на рельефе). roadRegistry хранит геометрию пути в метрах
// для последующей анимации машин (параметрическое движение по дистанции).
// ---------------------------------------------------------------------------
const ROAD_WIDTH = {
  motorway: 10, trunk: 9, primary: 8, secondary: 7, tertiary: 6,
  residential: 5, service: 3, unclassified: 5, living_street: 4,
  pedestrian: 3, footway: 1.5, path: 1.2, track: 2.5, cycleway: 1.5,
};
function roadWidthFor(tags) {
  return ROAD_WIDTH[tags.highway] || 4;
}
function roadColorFor(tags) {
  const h = tags.highway;
  if (['footway', 'path', 'pedestrian', 'track', 'cycleway', 'steps'].includes(h)) return 0x8a7a5a;
  return 0x363636;
}
// по этим типам дорог не пускаем машины — пешеходные/технические
const NON_DRIVABLE = new Set(['footway', 'path', 'pedestrian', 'cycleway', 'steps']);

const roadRegistry = []; // {points, cum, total, drivable}

function makeRoad(points2D, tags) {
  if (points2D.length < 2) return null;
  const width = roadWidthFor(tags);
  const color = roadColorFor(tags);

  const positions = [];
  const indices = [];
  const cum = [0];
  for (let i = 1; i < points2D.length; i++) {
    cum.push(cum[i - 1] + Math.hypot(points2D[i].x - points2D[i - 1].x, points2D[i].z - points2D[i - 1].z));
  }

  for (let i = 0; i < points2D.length; i++) {
    const p = points2D[i];
    const prev = points2D[Math.max(0, i - 1)];
    const next = points2D[Math.min(points2D.length - 1, i + 1)];
    const dx = next.x - prev.x, dz = next.z - prev.z;
    const len = Math.hypot(dx, dz) || 1;
    const nx = -dz / len, nz = dx / len; // нормаль к направлению движения
    positions.push(p.x + nx * width / 2, 0.12, p.z + nz * width / 2);
    positions.push(p.x - nx * width / 2, 0.12, p.z - nz * width / 2);
  }
  for (let i = 0; i < points2D.length - 1; i++) {
    const a = i * 2, b = i * 2 + 1, c = i * 2 + 2, d = i * 2 + 3;
    indices.push(a, b, c, b, d, c);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);

  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide }));
  cityGroup.add(mesh);
  loadedMeshes.push(mesh);

  if (cum[cum.length - 1] > 8 && !NON_DRIVABLE.has(tags.highway)) {
    roadRegistry.push({ points: points2D, cum, total: cum[cum.length - 1], highway: tags.highway });
  }
  return mesh;
}

// ---------------------------------------------------------------------------
// МАШИНЫ: voxel-блоки, едущие вдоль дорог по параметрической дистанции.
// Плотность (машин на метр дороги) и скорость зависят от типа highway —
// на магистралях больше и быстрее, во дворах/на service — редко и медленно.
// ---------------------------------------------------------------------------
const ROAD_CAR_PROFILE = {
  motorway:      { perMeter: 1 / 22, min: 2, max: 6, speedMin: 14, speedMax: 20 },
  trunk:         { perMeter: 1 / 22, min: 2, max: 6, speedMin: 13, speedMax: 18 },
  primary:       { perMeter: 1 / 22, min: 1, max: 5, speedMin: 10, speedMax: 15 },
  secondary:     { perMeter: 1 / 28, min: 1, max: 4, speedMin: 9,  speedMax: 13 },
  tertiary:      { perMeter: 1 / 40, min: 0, max: 3, speedMin: 7,  speedMax: 10 },
  unclassified:  { perMeter: 1 / 55, min: 0, max: 2, speedMin: 5,  speedMax: 7  },
  residential:   { perMeter: 1 / 70, min: 0, max: 2, speedMin: 3,  speedMax: 5  },
  living_street: { perMeter: 1 / 80, min: 0, max: 1, speedMin: 2,  speedMax: 4  },
  service:       { perMeter: 1 / 150, min: 0, max: 1, speedMin: 2, speedMax: 3 }, // почти пусто — 0-1 машина
};
const DEFAULT_CAR_PROFILE = { perMeter: 1 / 60, min: 0, max: 2, speedMin: 4, speedMax: 6 };

function carProfileFor(highway) {
  return ROAD_CAR_PROFILE[highway] || DEFAULT_CAR_PROFILE;
}

let cars = [];

function carBodyColor() {
  const palette = [0xd94848, 0x4870d9, 0xd9c548, 0xe8e8e8, 0x2a2a2a, 0x48a0d9, 0xd97a20];
  return palette[Math.floor(Math.random() * palette.length)];
}

// Длинная сторона всех моделей транспорта — вдоль локальной оси Z. Это важно:
// pointAtDistance() отдаёт heading = atan2(dx, dz), а при rotation.y=0
// three.js направляет локальную +Z вперёд в мировых координатах — значит
// "перёд" машины должен смотреть вдоль Z, иначе при повороте на heading
// транспорт едет боком.
function makeCarMesh() {
  const group = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.9, 1.4, 4.2),
    new THREE.MeshBasicMaterial({ color: carBodyColor() })
  );
  body.position.y = 0.9;
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.7, 1.0, 2.2),
    new THREE.MeshBasicMaterial({ color: 0x9fd0e8 })
  );
  cabin.position.set(0, 1.7, -0.2);
  group.add(body, cabin);
  return group;
}

function makeBusMesh() {
  const group = new THREE.Group();
  const livery = Math.random() < 0.5 ? 0x2a5fd9 : 0x2a9d5a; // синий / зелёный
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(2.4, 2.6, 7.2),
    new THREE.MeshBasicMaterial({ color: livery })
  );
  body.position.y = 1.5;
  const windowStrip = new THREE.Mesh(
    new THREE.BoxGeometry(2.42, 0.7, 7.0),
    new THREE.MeshBasicMaterial({ color: 0xbfe6f2 })
  );
  windowStrip.position.y = 2.1;
  group.add(body, windowStrip);
  return group;
}

function makeTruckMesh() {
  const group = new THREE.Group();
  const cab = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 2.0, 2.0),
    new THREE.MeshBasicMaterial({ color: 0xd8d8d0 })
  );
  cab.position.set(0, 1.2, -3.0);
  const cargoColors = [0xb08050, 0x5a7a5a, 0x8a8a8a, 0xc9a227];
  const cargo = new THREE.Mesh(
    new THREE.BoxGeometry(2.3, 2.4, 5.0),
    new THREE.MeshBasicMaterial({ color: cargoColors[Math.floor(Math.random() * cargoColors.length)] })
  );
  cargo.position.set(0, 1.4, 0.7);
  group.add(cab, cargo);
  return group;
}

// Микс типов транспорта: на магистралях (primary и крупнее) заметная доля
// автобусов/грузовиков, во дворах и на service — почти только легковые.
const VEHICLE_MIX_MAJOR = { car: 0.65, bus: 0.15, truck: 0.20 };
const VEHICLE_MIX_LOCAL = { car: 0.95, bus: 0,    truck: 0.05 };
const MAJOR_HIGHWAYS = new Set(['motorway', 'trunk', 'primary', 'secondary', 'tertiary']);
const VEHICLE_SPEED_MUL = { car: 1, bus: 0.85, truck: 0.8 };

function vehicleMixFor(highway) {
  return MAJOR_HIGHWAYS.has(highway) ? VEHICLE_MIX_MAJOR : VEHICLE_MIX_LOCAL;
}
function pickVehicleKind(mix) {
  const r = Math.random();
  if (r < mix.car) return 'car';
  if (r < mix.car + mix.bus) return 'bus';
  return 'truck';
}
function makeVehicleMesh(kind) {
  if (kind === 'bus') return makeBusMesh();
  if (kind === 'truck') return makeTruckMesh();
  return makeCarMesh();
}

function spawnCars() {
  cars.forEach(c => cityGroup.remove(c.mesh));
  cars = [];

  roadRegistry.forEach(road => {
    const profile = carProfileFor(road.highway);
    let count = Math.round(road.total * profile.perMeter);
    count = Math.min(profile.max, Math.max(profile.min, count));

    // service — не на каждом дворовом проезде должна стоять машина
    if (road.highway === 'service' && count > 0 && Math.random() > 0.35) count = 0;

    const mix = vehicleMixFor(road.highway);
    for (let i = 0; i < count; i++) {
      const kind = pickVehicleKind(mix);
      const mesh = makeVehicleMesh(kind);
      cityGroup.add(mesh);
      cars.push({
        mesh, road,
        dist: Math.random() * road.total,
        speed: (profile.speedMin + Math.random() * (profile.speedMax - profile.speedMin)) * VEHICLE_SPEED_MUL[kind],
        dir: Math.random() < 0.5 ? 1 : -1,
      });
    }
  });
}

function pointAtDistance(road, dist) {
  const { points, cum, total } = road;
  const d = ((dist % total) + total) % total;
  for (let i = 1; i < cum.length; i++) {
    if (d <= cum[i]) {
      const t = (d - cum[i - 1]) / (cum[i] - cum[i - 1] || 1);
      const a = points[i - 1], b = points[i];
      return {
        x: a.x + (b.x - a.x) * t,
        z: a.z + (b.z - a.z) * t,
        heading: Math.atan2(b.x - a.x, b.z - a.z),
      };
    }
  }
  return { x: points[0].x, z: points[0].z, heading: 0 };
}

function updateCars(dt) {
  cars.forEach(c => {
    c.dist += c.speed * c.dir * dt;
    const p = pointAtDistance(c.road, c.dist);
    c.mesh.position.set(p.x, 0.12, p.z);
    c.mesh.rotation.y = c.dir > 0 ? p.heading : p.heading + Math.PI;
  });
}

// ---------------------------------------------------------------------------
// МОТОРНАЯ ЛОДКА: по каждому крупному водоёму (waterBodyRegistry) ходит одна
// лодка по круговой траектории вокруг центроида полигона — простая, но
// достаточная имитация патрулирования акватории без честного pathfinding.
// ---------------------------------------------------------------------------
let boats = [];

function makeBoatMesh() {
  const group = new THREE.Group();
  const hull = new THREE.Mesh(
    new THREE.BoxGeometry(1.6, 0.6, 4.2),
    new THREE.MeshBasicMaterial({ color: 0xe8e4d8 })
  );
  hull.position.y = 0.35;
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 0.7, 1.6),
    new THREE.MeshBasicMaterial({ color: 0x3a5a78 })
  );
  cabin.position.set(0, 0.9, -0.6);
  group.add(hull, cabin);
  return group;
}

function spawnBoats() {
  boats.forEach(b => cityGroup.remove(b.mesh));
  boats = [];

  waterBodyRegistry.forEach(body => {
    const cx = body.pts.reduce((s, p) => s + p.x, 0) / body.pts.length;
    const cz = body.pts.reduce((s, p) => s + p.z, 0) / body.pts.length;
    const avgR = body.pts.reduce((s, p) => s + Math.hypot(p.x - cx, p.z - cz), 0) / body.pts.length;

    const mesh = makeBoatMesh();
    cityGroup.add(mesh);
    boats.push({
      mesh, cx, cz,
      radius: avgR * 0.55, // держимся подальше от берега
      angle: Math.random() * Math.PI * 2,
      angularSpeed: (0.12 + Math.random() * 0.08) * (Math.random() < 0.5 ? 1 : -1),
    });
  });
}

function updateBoats(dt) {
  boats.forEach(b => {
    b.angle += b.angularSpeed * dt;
    const x = b.cx + Math.cos(b.angle) * b.radius;
    const z = b.cz + Math.sin(b.angle) * b.radius;
    b.mesh.position.set(x, 0.15, z);

    // курс — касательная к окружности в направлении движения
    const dirSign = b.angularSpeed >= 0 ? 1 : -1;
    const dx = -Math.sin(b.angle) * dirSign;
    const dz = Math.cos(b.angle) * dirSign;
    b.mesh.rotation.y = Math.atan2(dx, dz);
  });
}

// ---------------------------------------------------------------------------
// ПОЕЗДА: локомотив + цепочка вагонов, идущих "змейкой" позади головы состава
// по той же полилинии (та же математика pointAtDistance, что и у машин, но
// каждый вагон запрашивает точку на смещённой дистанции = headDist - offset).
// Два вида: грузовой (зелёный тягач + цистерны) и пассажирский (белый
// локомотив + вагоны с окнами).
// ---------------------------------------------------------------------------
function makeLocomotiveMesh(bodyColor) {
  const group = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(2.9, 3.2, 11),
    new THREE.MeshBasicMaterial({ color: bodyColor })
  );
  body.position.y = 1.8;
  const cabWindow = new THREE.Mesh(
    new THREE.BoxGeometry(2.92, 0.8, 2.2),
    new THREE.MeshBasicMaterial({ color: 0x3a4550 })
  );
  cabWindow.position.set(0, 2.9, -4);
  group.add(body, cabWindow);
  return group;
}

function makeTankWagonMesh() {
  const group = new THREE.Group();
  const tank = new THREE.Mesh(
    new THREE.CylinderGeometry(1.5, 1.5, 10, 12),
    new THREE.MeshBasicMaterial({ color: 0x8a8a82 })
  );
  tank.rotation.x = Math.PI / 2; // ось цилиндра (по умолчанию Y) -> вдоль Z, "перёд"
  tank.position.y = 1.9;
  group.add(tank);
  return group;
}

function makePassengerWagonMesh() {
  const group = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(2.6, 2.2, 10),
    new THREE.MeshBasicMaterial({ color: 0xe8e4d8 })
  );
  body.position.y = 1.6;
  const windowStrip = new THREE.Mesh(
    new THREE.BoxGeometry(2.62, 0.6, 9.6),
    new THREE.MeshBasicMaterial({ color: 0x6a8aa0 })
  );
  windowStrip.position.y = 2.0;
  const stripe = new THREE.Mesh(
    new THREE.BoxGeometry(2.63, 0.25, 10),
    new THREE.MeshBasicMaterial({ color: 0x2a5fd9 })
  );
  stripe.position.y = 1.0;
  group.add(body, windowStrip, stripe);
  return group;
}

const TRAIN_KINDS = {
  freight:    { locoColor: 0x2f7d3a, wagonBuilder: makeTankWagonMesh, wagonCount: 5 },
  passenger:  { locoColor: 0xf2f2ec, wagonBuilder: makePassengerWagonMesh, wagonCount: 4 },
};
const TRAIN_CAR_SPACING = 11; // расстояние между центрами соседних вагонов, м
const TRAIN_MIN_RAIL_LENGTH = 100; // короткие подъездные пути — без составов

let trains = [];

function spawnTrains() {
  trains.forEach(t => t.cars.forEach(c => cityGroup.remove(c.mesh)));
  trains = [];

  railRegistry.forEach(rail => {
    if (rail.total < TRAIN_MIN_RAIL_LENGTH) return;
    const kind = TRAIN_KINDS[Math.random() < 0.5 ? 'freight' : 'passenger'];
    const dir = Math.random() < 0.5 ? 1 : -1;

    const cars = [];
    const locoMesh = makeLocomotiveMesh(kind.locoColor);
    cityGroup.add(locoMesh);
    cars.push({ mesh: locoMesh, offset: 0 });

    for (let i = 1; i <= kind.wagonCount; i++) {
      const wagonMesh = kind.wagonBuilder();
      cityGroup.add(wagonMesh);
      cars.push({ mesh: wagonMesh, offset: i * TRAIN_CAR_SPACING });
    }

    trains.push({
      cars, rail, dir,
      headDist: Math.random() * rail.total,
      speed: 8 + Math.random() * 4, // м/с — медленнее машин на магистралях, как и должно быть у состава
    });
  });
}

function updateTrains(dt) {
  trains.forEach(t => {
    t.headDist += t.speed * t.dir * dt;
    t.cars.forEach(c => {
      // вагоны отстают от головы состава на offset метров вдоль пути движения
      const d = t.headDist - c.offset * t.dir;
      const p = pointAtDistance(t.rail, d);
      c.mesh.position.set(p.x, 0.14, p.z);
      c.mesh.rotation.y = t.dir > 0 ? p.heading : p.heading + Math.PI;
    });
  });
}

// ---------------------------------------------------------------------------
// OVERPASS: запрос зданий внутри bbox.
// Порядок зеркал: сначала VK Maps (RU) — по опыту стабильнее из РФ, чем
// немецкий overpass-api.de; дальше официальный основной сервер; дальше
// private.coffee (бывший kumi.systems — домен сменился в 2026, старый
// адрес больше не даёт нужных CORS-заголовков).
// ---------------------------------------------------------------------------
const OVERPASS_ENDPOINTS = [
  'https://maps.mail.ru/osm/tools/overpass/api/interpreter',
  'https://overpass-api.de/api/interpreter',
  'https://overpass.private.coffee/api/interpreter',
];
const OVERPASS_TIMEOUT_MS = 12000; // не ждём зависшее зеркало вечно — переходим к следующему

async function fetchCityData(latMin, lonMin, latMax, lonMax, onAttempt) {
  const query = `[out:json][timeout:25];(
    way["building"](${latMin},${lonMin},${latMax},${lonMax});
    relation["building"](${latMin},${lonMin},${latMax},${lonMax});
    way["highway"](${latMin},${lonMin},${latMax},${lonMax});
    way["natural"="water"](${latMin},${lonMin},${latMax},${lonMax});
    relation["natural"="water"](${latMin},${lonMin},${latMax},${lonMax});
    way["landuse"="reservoir"](${latMin},${lonMin},${latMax},${lonMax});
    way["barrier"](${latMin},${lonMin},${latMax},${lonMax});
    way["railway"="rail"](${latMin},${lonMin},${latMax},${lonMax});
  );out geom;`;

  let lastErr;
  for (const endpoint of OVERPASS_ENDPOINTS) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), OVERPASS_TIMEOUT_MS);
    onAttempt?.(endpoint);
    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        body: 'data=' + encodeURIComponent(query),
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      return { elements: json.elements || [], endpoint };
    } catch (e) {
      clearTimeout(timer);
      lastErr = e;
      // пробуем следующее зеркало
    }
  }
  throw lastErr;
}

// ---------------------------------------------------------------------------
// ПЕРЕСТРОЙКА СЦЕНЫ ПОД РЕАЛЬНЫЙ BBOX
// ---------------------------------------------------------------------------
function reframeTo(widthMeters, depthMeters) {
  const maxDim = Math.max(widthMeters, depthMeters);
  FRUSTUM_SIZE_STATE.value = maxDim * 1.35;
  const newGroundSize = maxDim * 1.5;
  ground.geometry.dispose();
  ground.geometry = new THREE.PlaneGeometry(newGroundSize, newGroundSize);
  groundTexture.repeat.set(newGroundSize / GROUND_TILE_METERS, newGroundSize / GROUND_TILE_METERS);
  applyResolution();
}

// ---------------------------------------------------------------------------
// МИНИКАРТА (Leaflet): видимая область миникарты САМА является bbox для
// генерации — никакого отдельного прямоугольника-оверлея не рисуем, просто
// читаем minimap.getBounds() в момент нажатия «сгенерировать». Это заодно
// даёт бесплатную панораму/зум для поиска нужного места.
// ---------------------------------------------------------------------------
let minimap, minimapBuildingsLayer, minimapRoadsLayer;

function initMinimap() {
  minimap = L.map('minimap', {
    zoomControl: true,
    attributionControl: false,
    dragging: true,
    scrollWheelZoom: true,
  }).setView([53.252, 34.370], 16);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    subdomains: ['a', 'b', 'c'],
    maxZoom: 19,
  }).addTo(minimap);

  minimapRoadsLayer = L.layerGroup().addTo(minimap);
  minimapBuildingsLayer = L.layerGroup().addTo(minimap);

  minimap.on('moveend zoomend', updateBboxReadout);
  updateBboxReadout();
}

function updateBboxReadout() {
  if (!minimap) return;
  const b = minimap.getBounds();
  const { w, h } = boundsToMeters(b);
  document.getElementById('bboxW').textContent = Math.round(w) + ' м';
  document.getElementById('bboxH').textContent = Math.round(h) + ' м';
}

function boundsToMeters(bounds) {
  const south = bounds.getSouth(), north = bounds.getNorth();
  const west = bounds.getWest(), east = bounds.getEast();
  const refLat = (south + north) / 2;
  const w = (east - west) * Math.PI / 180 * EARTH_R * Math.cos(refLat * Math.PI / 180);
  const h = (north - south) * Math.PI / 180 * EARTH_R;
  return { w: Math.abs(w), h: Math.abs(h) };
}

function updateMinimapOverlay(elements) {
  if (!minimap) return;
  minimapBuildingsLayer.clearLayers();
  minimapRoadsLayer.clearLayers();

  (elements || []).forEach(el => {
    if (el.type === 'way' && el.geometry) {
      const latlngs = el.geometry.map(g => [g.lat, g.lon]);
      if (el.tags?.building) {
        const type = classifyBuilding(el.tags);
        const color = type === 'residential' ? '#d98a4a' : type === 'industrial' ? '#8a97a3' : '#b8b0a0';
        L.polygon(latlngs, { color, weight: 1, fillColor: color, fillOpacity: 0.65 }).addTo(minimapBuildingsLayer);
      } else if (el.tags?.highway) {
        L.polyline(latlngs, { color: '#5cf', weight: 2, opacity: 0.8 }).addTo(minimapRoadsLayer);
      } else if (el.tags?.railway === 'rail') {
        L.polyline(latlngs, { color: '#5a5248', weight: 2, opacity: 0.9, dashArray: '6,3' }).addTo(minimapRoadsLayer);
      } else if (el.tags?.natural === 'water' || el.tags?.landuse === 'reservoir') {
        L.polygon(latlngs, { color: '#1f4f70', weight: 1, fillColor: '#2f6ea8', fillOpacity: 0.7 }).addTo(minimapBuildingsLayer);
      } else if (el.tags?.barrier) {
        L.polyline(latlngs, { color: '#a08050', weight: 1, opacity: 0.8, dashArray: '3,3' }).addTo(minimapRoadsLayer);
      }
    } else if (el.type === 'relation' && (el.tags?.building || el.tags?.natural === 'water')) {
      const isWater = el.tags?.natural === 'water';
      const outerSegs = [], innerSegs = [];
      (el.members || []).forEach(m => {
        if (!m.geometry) return;
        (m.role === 'inner' ? innerSegs : outerSegs).push(m.geometry);
      });
      let color;
      if (isWater) {
        color = '#2f6ea8';
      } else {
        const type = classifyBuilding(el.tags);
        color = type === 'residential' ? '#d98a4a' : type === 'industrial' ? '#8a97a3' : '#b8b0a0';
      }
      assembleRings(outerSegs).forEach(ring => {
        const latlngs = ring.map(pt => [pt.lat, pt.lon]);
        const holeLatlngs = assembleRings(innerSegs).map(h => h.map(pt => [pt.lat, pt.lon]));
        L.polygon([latlngs, ...holeLatlngs], { color, weight: 1, fillColor: color, fillOpacity: 0.65 }).addTo(minimapBuildingsLayer);
      });
    }
  });
}

async function geocodeAndFly(query) {
  const statusEl = document.getElementById('status');
  if (!query.trim()) return;
  statusEl.textContent = 'поиск места...';
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`);
    const results = await res.json();
    if (!results.length) { statusEl.textContent = 'место не найдено'; return; }
    minimap.setView([parseFloat(results[0].lat), parseFloat(results[0].lon)], 16);
    statusEl.textContent = 'наведите миникарту и нажмите «сгенерировать»';
  } catch (e) {
    statusEl.textContent = 'ошибка геокодирования';
    console.error(e);
  }
}

async function loadFromOverpass() {
  const bounds = minimap.getBounds();
  const latMin = bounds.getSouth(), latMax = bounds.getNorth();
  const lonMin = bounds.getWest(), lonMax = bounds.getEast();
  const statusEl = document.getElementById('status');

  const refLat = (latMin + latMax) / 2;
  const refLon = (lonMin + lonMax) / 2;

  statusEl.textContent = 'запрос к Overpass...';
  try {
    const { elements, endpoint } = await fetchCityData(
      latMin, lonMin, latMax, lonMax,
      (ep) => { statusEl.textContent = `пробуем ${new URL(ep).hostname}...`; }
    );
    clearLoadedBuildings();

    let buildingCount = 0, roadCount = 0, waterCount = 0, barrierCount = 0, railCount = 0;
    for (const el of elements) {
      if (el.type === 'way' && el.geometry) {
        const points2D = el.geometry.map(g => geoToLocal(g.lat, g.lon, refLat, refLon));
        if (el.tags?.building) {
          const type = classifyBuilding(el.tags);
          const height = estimateHeight(el.tags);
          if (makeFootprintBuilding(points2D, height, type)) buildingCount++;
        } else if (el.tags?.highway) {
          if (makeRoad(points2D, el.tags)) roadCount++;
        } else if (el.tags?.railway === 'rail') {
          if (makeRailway(points2D)) railCount++;
        } else if (el.tags?.natural === 'water' || el.tags?.landuse === 'reservoir') {
          if (makeWaterBody(points2D)) waterCount++;
        } else if (el.tags?.barrier) {
          if (makeBarrier(points2D, el.tags)) barrierCount++;
        }
      } else if (el.type === 'relation' && el.tags?.building) {
        // multipolygon: контур (и дырки-дворы) собраны из нескольких way-фрагментов —
        // склеиваем их в кольца, затем переводим в локальные метры.
        const outerSegs = [], innerSegs = [];
        (el.members || []).forEach(m => {
          if (!m.geometry || m.geometry.length < 2) return;
          (m.role === 'inner' ? innerSegs : outerSegs).push(m.geometry);
        });
        const outerRings = assembleRings(outerSegs)
          .map(ring => ring.map(pt => geoToLocal(pt.lat, pt.lon, refLat, refLon)));
        const innerRings = assembleRings(innerSegs)
          .map(ring => ring.map(pt => geoToLocal(pt.lat, pt.lon, refLat, refLon)));

        const type = classifyBuilding(el.tags);
        const height = estimateHeight(el.tags);

        outerRings.forEach(outerPts => {
          // если внешних контуров несколько (relation описывает сразу группу
          // корпусов) — привязываем дырку к тому контуру, в который она попадает
          const holes = innerRings.filter(ring =>
            ring.length && (outerRings.length === 1 || pointInPolygon(ring[0], outerPts))
          );
          if (makeFootprintBuilding(outerPts, height, type, holes)) buildingCount++;
        });
      } else if (el.type === 'relation' && el.tags?.natural === 'water') {
        // multipolygon-водоём (озеро с островом внутри и т.п.) — та же сборка колец
        const outerSegs = [], innerSegs = [];
        (el.members || []).forEach(m => {
          if (!m.geometry || m.geometry.length < 2) return;
          (m.role === 'inner' ? innerSegs : outerSegs).push(m.geometry);
        });
        const outerRings = assembleRings(outerSegs)
          .map(ring => ring.map(pt => geoToLocal(pt.lat, pt.lon, refLat, refLon)));
        const innerRings = assembleRings(innerSegs)
          .map(ring => ring.map(pt => geoToLocal(pt.lat, pt.lon, refLat, refLon)));

        outerRings.forEach(outerPts => {
          const holes = innerRings.filter(ring =>
            ring.length && (outerRings.length === 1 || pointInPolygon(ring[0], outerPts))
          );
          if (makeWaterBody(outerPts, holes)) waterCount++;
        });
      }
    }
    spawnCars();
    spawnBoats();
    spawnTrains();

    const corner1 = geoToLocal(latMin, lonMin, refLat, refLon);
    const corner2 = geoToLocal(latMax, lonMax, refLat, refLon);
    reframeTo(Math.abs(corner2.x - corner1.x), Math.abs(corner2.z - corner1.z));
    updateMinimapOverlay(elements);

    statusEl.textContent = `готово: ${buildingCount} зданий, ${roadCount} дорог, ${railCount} ж/д путей, ${waterCount} водоёмов, ${barrierCount} заборов, ${cars.length} машин, ${boats.length} лодок, ${trains.length} составов (${new URL(endpoint).hostname})`;
  } catch (e) {
    statusEl.textContent = 'ошибка Overpass — демо-заглушка';
    console.error(e);
    clearLoadedBuildings();
    loadPlaceholderDemo();
  }
}

document.getElementById('loadBtn').addEventListener('click', loadFromOverpass);
document.getElementById('geocodeBtn').addEventListener('click', () => geocodeAndFly(document.getElementById('geocodeInput').value));
document.getElementById('geocodeInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') geocodeAndFly(e.target.value);
});

// стартовая загрузка демо-bbox при открытии страницы
initMinimap();
loadFromOverpass();

// ---------------------------------------------------------------------------
// КОМПАС: т.к. cityGroup развёрнут на CITY_ROTATION_DEG вокруг Y, а -Z в
// мировых координатах = север, стрелка компаса на экране должна учитывать
// этот поворот. Считаем экранный угол направления "север" один раз.
// ---------------------------------------------------------------------------
function updateCompass() {
  // направление "север" в мировых координатах после поворота cityGroup
  const northWorld = new THREE.Vector3(0, 0, -1)
    .applyAxisAngle(new THREE.Vector3(0, 1, 0), cityGroup.rotation.y);

  // проекция этого вектора на плоскость экрана при текущей изо-камере:
  // экранный X ~ (east - north)-компонента, экранный Y ~ вертикаль минус (east+north)
  // для true isometric (азимут камеры 45°, positions (1,1,1)) действует:
  const sx = northWorld.x - northWorld.z;
  const sy = northWorld.x + northWorld.z; // экранная "глубина", не используем для угла напрямую
  const angleRad = Math.atan2(sx, -northWorld.y * 0 - 1) ; // упрощённо: см. ниже точный расчёт

  // Точный расчёт: спроецируем точку (northWorld) камерой и сравним с центром экрана.
  const p0 = new THREE.Vector3(0, 0, 0).project(camera);
  const p1 = northWorld.clone().project(camera);
  const dx = p1.x - p0.x;
  const dy = -(p1.y - p0.y); // инверсия Y (canvas vs NDC)
  const screenAngleDeg = Math.atan2(dx, dy) * 180 / Math.PI;

  document.getElementById('compass-needle').setAttribute(
    'transform', `rotate(${screenAngleDeg} 30 30)`
  );
}

// ---------------------------------------------------------------------------
// RENDER LOOP + управление внутренним разрешением (pixel-art чанкость)
// ---------------------------------------------------------------------------
function applyResolution() {
  const w = Math.round(VIEW_W * INTERNAL_SCALE);
  const h = Math.round(VIEW_H * INTERNAL_SCALE);
  renderer.setSize(w, h, false);
  renderer.domElement.style.width = VIEW_W + 'px';
  renderer.domElement.style.height = VIEW_H + 'px';
  camera.left   = -FRUSTUM_SIZE_STATE.value * (VIEW_W / VIEW_H) / 2;
  camera.right  =  FRUSTUM_SIZE_STATE.value * (VIEW_W / VIEW_H) / 2;
  camera.top    =  FRUSTUM_SIZE_STATE.value / 2;
  camera.bottom = -FRUSTUM_SIZE_STATE.value / 2;
  camera.updateProjectionMatrix();
}
applyResolution();
updateCompass();

document.querySelectorAll('#controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    INTERNAL_SCALE = parseFloat(btn.dataset.scale);
    applyResolution();
  });
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1); // clamp, чтобы вкладка после сворачивания не дёрнула машины телепортом
  updateCars(dt);
  updateBoats(dt);
  updateTrains(dt);
  renderer.render(scene, camera);
}
animate();
</script>
